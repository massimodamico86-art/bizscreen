<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#E0F2FE" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="200" fill="#0369A1" data-customize-color="primary"/>
  <image id="logo" x="80" y="50" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline" x="960" y="120" font-family="Helvetica, Arial, sans-serif"
        font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Bright Smiles Dental
  </text>
  <text id="text-eyebrow" x="960" y="320" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#0369A1" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    Welcome
  </text>
  <text id="text-svc1" x="320" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="service1">
    General Dentistry
  </text>
  <text id="text-svc2" x="320" y="600" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="service2">
    Cleanings &amp; Checkups
  </text>
  <text id="text-svc3" x="320" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="service3">
    Cosmetic &amp; Whitening
  </text>
  <text id="text-svc4" x="320" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="service4">
    Pediatric Dentistry
  </text>
  <rect x="1100" y="450" width="600" height="380" fill="#FFFFFF"
        data-customize-color="card"/>
  <text id="text-hours-title" x="1400" y="540" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#0369A1" text-anchor="middle"
        data-customize-text="hours-title" data-customize-color="primary">
    Office Hours
  </text>
  <text id="text-hours-line1" x="1400" y="640" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#1a1a1a" text-anchor="middle" data-customize-text="hours-line1">
    Mon–Fri: 8am – 6pm
  </text>
  <text id="text-hours-line2" x="1400" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#1a1a1a" text-anchor="middle" data-customize-text="hours-line2">
    Sat: 9am – 2pm
  </text>
  <text id="text-hours-line3" x="1400" y="760" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#1a1a1a" text-anchor="middle" data-customize-text="hours-line3">
    Sun: Closed
  </text>
  <text id="text-footer" x="960" y="990" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#0369A1" text-anchor="middle"
        data-customize-text="footer" data-customize-color="primary">
    Most insurance accepted · Call (555) 555-DENT
  </text>
</svg>
