<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#1A1A1A" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="160" fill="#E63946" data-customize-color="primary"/>
  <image id="logo" x="120" y="40" width="80" height="80" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-banner" x="960" y="100" font-family="Helvetica, Arial, sans-serif"
        font-size="56" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="banner">
    Personal Training
  </text>
  <text id="text-eyebrow" x="960" y="280" font-family="Helvetica, Arial, sans-serif"
        font-size="36" letter-spacing="8" fill="#E63946" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    NEW MEMBER OFFER
  </text>
  <text id="text-headline" x="960" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="180" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    First Session Free
  </text>
  <text id="text-row1" x="960" y="660" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row1">
    1-on-1 with a certified trainer
  </text>
  <text id="text-row2" x="960" y="720" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row2">
    Custom program · Goal-based progress tracking
  </text>
  <text id="text-row3" x="960" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#E63946" text-anchor="middle"
        data-customize-text="row3" data-customize-color="primary">
    Then $79/session · 5-pack: $349
  </text>
  <text id="text-cta" x="960" y="950" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#E63946" text-anchor="middle"
        data-customize-text="cta" data-customize-color="primary">
    Book at the front desk
  </text>
</svg>
