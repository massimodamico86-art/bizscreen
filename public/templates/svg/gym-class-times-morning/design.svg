<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FFD60A" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="200" fill="#001D3D" data-customize-color="primary"/>
  <image id="logo" x="120" y="60" width="80" height="80" xlink:href=""
