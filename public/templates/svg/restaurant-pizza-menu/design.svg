<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FAF3E7" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="180" fill="#C03221" data-customize-color="primary"/>
  <image id="logo" x="120" y="50" width="80" height="80" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-banner" x="960" y="115" font-family="Georgia, serif"
        font-size="64" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="banner">
    Wood-Fired Pizza Menu
  </text>
  <text id="text-row1-name" x="200" y="320" font-family="Georgia, serif"
        font-size="44" fill="#3D2817" text-anchor="start"
        data-customize-text="row1-name">
    Margherita · Tomato, mozzarella, basil
  </text>
  <text id="text-row1-price" x="1720" y="320" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C03221" text-anchor="end"
        data-customize-text="row1-price" data-customize-color="primary">
    $14
  </text>
  <text id="text-row2-name" x="200" y="430" font-family="Georgia, serif"
        font-size="44" fill="#3D2817" text-anchor="start"
        data-customize-text="row2-name">
    Pepperoni · Aged provolone, hot honey
  </text>
  <text id="text-row2-price" x="1720" y="430" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C03221" text-anchor="end"
        data-customize-text="row2-price" data-customize-color="primary">
    $17
  </text>
  <text id="text-row3-name" x="200" y="540" font-family="Georgia, serif"
        font-size="44" fill="#3D2817" text-anchor="start"
        data-customize-text="row3-name">
    Funghi · Wild mushroom, truffle oil
  </text>
  <text id="text-row3-price" x="1720" y="540" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C03221" text-anchor="end"
        data-customize-text="row3-price" data-customize-color="primary">
    $19
  </text>
  <text id="text-row4-name" x="200" y="650" font-family="Georgia, serif"
        font-size="44" fill="#3D2817" text-anchor="start"
        data-customize-text="row4-name">
    Diavola · Spicy salami, chili flakes
  </text>
  <text id="text-row4-price" x="1720" y="650" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C03221" text-anchor="end"
        data-customize-text="row4-price" data-customize-color="primary">
    $18
  </text>
  <text id="text-row5-name" x="200" y="760" font-family="Georgia, serif"
        font-size="44" fill="#3D2817" text-anchor="start"
        data-customize-text="row5-name">
    Quattro Formaggi · Four-cheese
  </text>
  <text id="text-row5-price" x="1720" y="760" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C03221" text-anchor="end"
        data-customize-text="row5-price" data-customize-color="primary">
    $20
  </text>
  <text id="text-footer" x="960" y="950" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#666666" text-anchor="middle"
        data-customize-text="footer">
    Gluten-free crust available · +$3
  </text>
</svg>
