<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#06D6A0" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="40" fill="#1B1B1B" data-customize-color="primary"/>
  <rect x="0" y="1040" width="1920" height="40" fill="#1B1B1B" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="240" font-family="Helvetica, Arial, sans-serif"
        font-size="48" letter-spacing="6" fill="#1B1B1B" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    THIS WEEK ONLY
  </text>
  <text id="text-headline" x="960" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="220" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    BUY ONE
  </text>
  <text id="text-headline2" x="960" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="220" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline2">
    GET ONE FREE
  </text>
  <text id="text-cta" x="960" y="850" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1B1B1B" text-anchor="middle"
        data-customize-text="cta">
    Mix and match · Lower-priced item free
  </text>
  <text id="text-footer" x="960" y="970" font-family="Helvetica, Arial, sans-serif"
        font-size="28" fill="#1B1B1B" text-anchor="middle"
        data-customize-text="footer">
    Excludes clearance · See store associate
  </text>
</svg>
