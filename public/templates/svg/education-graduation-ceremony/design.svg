<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#3D1F4F" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="6" fill="#FFD700" data-customize-color="primary"/>
  <rect x="0" y="1074" width="1920" height="6" fill="#FFD700" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="220" font-family="Helvetica, Arial, sans-serif"
        font-size="36" letter-spacing="12" fill="#FFD700" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    CLASS OF 2026
  </text>
  <text id="text-headline" x="960" y="440" font-family="Georgia, serif"
        font-size="160" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Commencement
  </text>
  <text id="text-subheadline" x="960" y="600" font-family="Georgia, serif"
        font-size="56" font-style="italic" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="subheadline">
    Saturday, May 23rd · 10:00am
  </text>
  <text id="text-row1" x="960" y="760" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row1">
    Memorial Stadium · Doors at 9:00am
  </text>
  <text id="text-row2" x="960" y="830" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#FFD700" text-anchor="middle"
        data-customize-text="row2" data-customize-color="primary">
    Reception to follow on the Quad
  </text>
  <text id="text-footer" x="960" y="990" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="footer">
    Live stream at edu.example.com/live
  </text>
</svg>
