<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FAF7F2" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="200" fill="#5B3A8C" data-customize-color="primary"/>
  <image id="logo" x="80" y="50" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline" x="960" y="130" font-family="Helvetica, Arial, sans-serif"
        font-size="80" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Today's Class Schedule
  </text>
  <text id="text-row1-time" x="240" y="380" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#5B3A8C" text-anchor="start"
        data-customize-text="row1-time" data-customize-color="primary">
    8:00 AM
  </text>
  <text id="text-row1-class" x="500" y="380" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="row1-class">
    Algebra II — Mr. Khan — Rm 204
  </text>
  <line x1="240" y1="420" x2="1680" y2="420" stroke="#E0DCD5" stroke-width="2"/>
  <text id="text-row2-time" x="240" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#5B3A8C" text-anchor="start"
        data-customize-text="row2-time" data-customize-color="primary">
    9:30 AM
  </text>
  <text id="text-row2-class" x="500" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="row2-class">
    World History — Ms. Patel — Rm 118
  </text>
  <line x1="240" y1="540" x2="1680" y2="540" stroke="#E0DCD5" stroke-width="2"/>
  <text id="text-row3-time" x="240" y="620" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#5B3A8C" text-anchor="start"
        data-customize-text="row3-time" data-customize-color="primary">
    11:00 AM
  </text>
  <text id="text-row3-class" x="500" y="620" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="row3-class">
    Biology Lab — Dr. Reyes — Rm 309
  </text>
  <line x1="240" y1="660" x2="1680" y2="660" stroke="#E0DCD5" stroke-width="2"/>
  <text id="text-row4-time" x="240" y="740" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#5B3A8C" text-anchor="start"
        data-customize-text="row4-time" data-customize-color="primary">
    1:30 PM
  </text>
  <text id="text-row4-class" x="500" y="740" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#1a1a1a" text-anchor="start" data-customize-text="row4-class">
    English Literature — Ms. Cole — Rm 207
  </text>
  <text id="text-footer" x="960" y="960" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#5B3A8C" text-anchor="middle"
        data-customize-text="footer" data-customize-color="primary">
    Late slips at the main office
  </text>
</svg>
