<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#0F0F23" data-customize-color="background"/>
  <rect x="0" y="0" width="1080" height="500" fill="#A21CAF" data-customize-color="primary"/>
  <image id="logo" x="60" y="60" width="120" height="120" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="540" y="280" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FBCFE8" text-anchor="middle" data-customize-text="eyebrow">
    BOOTH 224 · HALL B
  </text>
  <text id="text-headline" x="540" y="420" font-family="Helvetica, Arial, sans-serif"
        font-size="120" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Stop By!
  </text>
  <text id="text-feat1" x="540" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#A21CAF" text-anchor="middle"
        data-customize-text="feature1" data-customize-color="primary">
    Live product demo
  </text>
  <text id="text-feat2" x="540" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#A21CAF" text-anchor="middle"
        data-customize-text="feature2" data-customize-color="primary">
    Free swag &amp; raffle
  </text>
  <text id="text-feat3" x="540" y="900" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#A21CAF" text-anchor="middle"
        data-customize-text="feature3" data-customize-color="primary">
    Coffee on us
  </text>
  <rect x="120" y="1050" width="840" height="6" fill="#A21CAF" data-customize-color="primary"/>
  <text id="text-cta-title" x="540" y="1200" font-family="Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="cta-title">
    Schedule a meeting
  </text>
  <text id="text-cta-detail" x="540" y="1280" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FBCFE8" text-anchor="middle" data-customize-text="cta-detail">
    book.example.com/expo
  </text>
  <text id="text-feature" x="540" y="1500" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#FFFFFF" text-anchor="middle" data-customize-text="featured-time">
    Featured talk: Wed 2pm Main Stage
  </text>
  <text id="text-footer" x="540" y="1820" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#888888" text-anchor="middle" data-customize-text="footer">
    Acme · Booth 224 · Hall B
  </text>
</svg>
