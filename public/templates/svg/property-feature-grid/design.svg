<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FFFFFF" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="200" fill="#7F1D1D" data-customize-color="primary"/>
  <image id="logo" x="80" y="50" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline" x="960" y="125" font-family="Georgia, serif"
        font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Featured Property
  </text>
  <rect x="80" y="280" width="560" height="360" fill="#F5F5F4" data-customize-color="card"/>
  <text id="text-tile1-title" x="360" y="430" font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#7F1D1D" text-anchor="middle"
        data-customize-text="tile1-title" data-customize-color="primary">
    4 BED
  </text>
  <text id="text-tile1-detail" x="360" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#525252" text-anchor="middle" data-customize-text="tile1-detail">
    Master suite included
  </text>
  <rect x="680" y="280" width="560" height="360" fill="#F5F5F4" data-customize-color="card"/>
  <text id="text-tile2-title" x="960" y="430" font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#7F1D1D" text-anchor="middle"
        data-customize-text="tile2-title" data-customize-color="primary">
    3.5 BATH
  </text>
  <text id="text-tile2-detail" x="960" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#525252" text-anchor="middle" data-customize-text="tile2-detail">
    Updated fixtures
  </text>
  <rect x="1280" y="280" width="560" height="360" fill="#F5F5F4" data-customize-color="card"/>
  <text id="text-tile3-title" x="1560" y="430" font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#7F1D1D" text-anchor="middle"
        data-customize-text="tile3-title" data-customize-color="primary">
    2,800 sqft
  </text>
  <text id="text-tile3-detail" x="1560" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#525252" text-anchor="middle" data-customize-text="tile3-detail">
    Open floor plan
  </text>
  <rect x="80" y="680" width="1760" height="220" fill="#FAFAFA" data-customize-color="card"/>
  <text id="text-address" x="960" y="780" font-family="Georgia, serif"
        font-size="60" fill="#1a1a1a" text-anchor="middle" data-customize-text="address">
    742 Evergreen Ter
  </text>
  <text id="text-price" x="960" y="860" font-family="Georgia, serif"
        font-size="56" font-weight="700" fill="#7F1D1D" text-anchor="middle"
        data-customize-text="price" data-customize-color="primary">
    $725,000
  </text>
  <text id="text-footer" x="960" y="990" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#888888" text-anchor="middle" data-customize-text="footer">
    Listing Agent: Robert Reyes · (555) 220-7474
  </text>
</svg>
