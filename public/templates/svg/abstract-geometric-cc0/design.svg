<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FAFAFA" data-customize-color="background"/>
  <rect x="120" y="120" width="400" height="400" fill="#264653" data-customize-color="primary"/>
  <rect x="540" y="120" width="400" height="400" fill="#2A9D8F" data-customize-color="accent"/>
  <rect x="960" y="120" width="400" height="400" fill="#E9C46A" data-customize-color="primary"/>
  <rect x="1380" y="120" width="400" height="400" fill="#F4A261" data-customize-color="accent"/>
  <rect x="120" y="540" width="820" height="400" fill="#E76F51" data-customize-color="primary"/>
  <rect x="960" y="540" width="820" height="400" fill="#264653" data-customize-color="primary"/>
  <image id="logo" x="180" y="600" width="80" height="80" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline" x="550" y="780" font-family="Georgia, serif"
        font-size="80" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Bold &amp; Modern
  </text>
  <text id="text-subheadline" x="1370" y="780" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="subheadline">
    Add your message here
  </text>
</svg>
