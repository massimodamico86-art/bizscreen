  <rect width="1920" height="1080" fill="#1A2B4D" data-customize-color="background"/>
  <rect x="0" y="700" width="80" height="380" fill="#0F1A30" data-customize-color="primary"/>
  <rect x="80" y="600" width="120" height="480" fill="#0F1A30" data-customize-color="primary"/>
  <rect x="200" y="560" width="80" height="520" fill="#0F1A30" data-customize-color="primary"/>
