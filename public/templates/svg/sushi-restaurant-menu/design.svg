<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#1a1a1a" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="6" fill="#E63946" data-customize-color="primary"/>
  <rect x="0" y="1074" width="1920" height="6" fill="#E63946" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="140" height="140" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="200" font-family="Georgia, serif"
        font-size="40" fill="#E63946" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    OMAKASE
  </text>
  <text id="text-headline" x="960" y="320" font-family="Georgia, serif"
        font-size="96" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Tonight's Sushi Selection
  </text>
  <text id="text-row1" x="960" y="500" font-family="Helvetica, Arial, sans-serif"
