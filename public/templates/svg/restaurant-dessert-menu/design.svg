<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#251111" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="6" fill="#D4AF37" data-customize-color="primary"/>
  <rect x="0" y="1074" width="1920" height="6" fill="#D4AF37" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="220" font-family="Georgia, serif"
        font-size="36" font-style="italic" fill="#D4AF37" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    Sweet endings
  </text>
  <text id="text-headline" x="960" y="360" font-family="Georgia, serif"
        font-size="120" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Dessert Menu
  </text>
  <text id="text-row1-name" x="200" y="540" font-family="Georgia, serif"
        font-size="40" fill="#F5F5F5" text-anchor="start"
        data-customize-text="row1-name">
    Crème Brûlée · Vanilla bean custard
  </text>
  <text id="text-row1-price" x="1720" y="540" font-family="Georgia, serif"
        font-size="40" font-weight="700" fill="#D4AF37" text-anchor="end"
        data-customize-text="row1-price" data-customize-color="primary">
    $12
  </text>
  <text id="text-row2-name" x="200" y="630" font-family="Georgia, serif"
        font-size="40" fill="#F5F5F5" text-anchor="start"
        data-customize-text="row2-name">
    Chocolate Lava Cake · House gelato
  </text>
  <text id="text-row2-price" x="1720" y="630" font-family="Georgia, serif"
        font-size="40" font-weight="700" fill="#D4AF37" text-anchor="end"
        data-customize-text="row2-price" data-customize-color="primary">
    $13
  </text>
  <text id="text-row3-name" x="200" y="720" font-family="Georgia, serif"
        font-size="40" fill="#F5F5F5" text-anchor="start"
        data-customize-text="row3-name">
    Tiramisu · Espresso-soaked layers
  </text>
  <text id="text-row3-price" x="1720" y="720" font-family="Georgia, serif"
        font-size="40" font-weight="700" fill="#D4AF37" text-anchor="end"
        data-customize-text="row3-price" data-customize-color="primary">
    $11
  </text>
  <text id="text-row4-name" x="200" y="810" font-family="Georgia, serif"
        font-size="40" fill="#F5F5F5" text-anchor="start"
        data-customize-text="row4-name">
    Affogato · Espresso, vanilla gelato
  </text>
  <text id="text-row4-price" x="1720" y="810" font-family="Georgia, serif"
        font-size="40" font-weight="700" fill="#D4AF37" text-anchor="end"
        data-customize-text="row4-price" data-customize-color="primary">
    $9
  </text>
  <text id="text-footer" x="960" y="970" font-family="Helvetica, Arial, sans-serif"
        font-size="28" fill="#999999" text-anchor="middle"
        data-customize-text="footer">
    Pair with a glass of dessert wine · ask your server
  </text>
</svg>
