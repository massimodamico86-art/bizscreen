<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#16213E" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="6" fill="#FFC93C" data-customize-color="primary"/>
  <rect x="0" y="1074" width="1920" height="6" fill="#FFC93C" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="220" font-family="Helvetica, Arial, sans-serif"
        font-size="40" letter-spacing="12" fill="#FFC93C" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    THURSDAY NIGHTS
  </text>
  <text id="text-headline" x="960" y="440" font-family="Georgia, serif"
        font-size="180" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Pub Trivia
  </text>
  <text id="text-subheadline" x="960" y="600" font-family="Helvetica, Arial, sans-serif"
        font-size="56" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="subheadline">
    7:00pm Sharp · Free to play
  </text>
  <text id="text-row1" x="960" y="730" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row1">
    1st place · $100 bar tab
  </text>
  <text id="text-row2" x="960" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row2">
    2nd · $50 · 3rd · $25
  </text>
  <text id="text-cta" x="960" y="950" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#FFC93C" text-anchor="middle"
        data-customize-text="cta" data-customize-color="primary">
    Bring your team · Max 6 players
  </text>
</svg>
