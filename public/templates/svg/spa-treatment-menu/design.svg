<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#F0E6DA" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="180" fill="#7C5C3F" data-customize-color="primary"/>
  <image id="logo" x="80" y="40" width="100" height="100" xlink:href=""
