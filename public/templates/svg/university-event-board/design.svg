<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#0F172A" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="160" fill="#FACC15" data-customize-color="primary"/>
  <image id="logo" x="80" y="30" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline" x="960" y="105" font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#0F172A" text-anchor="middle"
        data-customize-text="headline">
    Campus Events This Week
  </text>
  <text id="text-row1-date" x="200" y="320" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#FACC15" text-anchor="start"
        data-customize-text="row1-date" data-customize-color="primary">
    Mon · 7pm — Faculty Lecture: Climate Futures
  </text>
  <text id="text-row1-detail" x="200" y="370" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#CBD5E1" text-anchor="start" data-customize-text="row1-detail">
    Hayden Hall · Free admission
  </text>
  <text id="text-row2-date" x="200" y="470" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#FACC15" text-anchor="start"
        data-customize-text="row2-date" data-customize-color="primary">
    Wed · 6pm — Career Fair
  </text>
  <text id="text-row2-detail" x="200" y="520" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#CBD5E1" text-anchor="start" data-customize-text="row2-detail">
    Student Union · 80+ employers
  </text>
  <text id="text-row3-date" x="200" y="620" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#FACC15" text-anchor="start"
        data-customize-text="row3-date" data-customize-color="primary">
    Fri · 8pm — Symphony Orchestra Concert
  </text>
  <text id="text-row3-detail" x="200" y="670" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#CBD5E1" text-anchor="start" data-customize-text="row3-detail">
    Music Building Recital Hall
  </text>
  <text id="text-row4-date" x="200" y="770" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#FACC15" text-anchor="start"
        data-customize-text="row4-date" data-customize-color="primary">
    Sat · 1pm — Football vs State
  </text>
  <text id="text-row4-detail" x="200" y="820" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#CBD5E1" text-anchor="start" data-customize-text="row4-detail">
    Memorial Stadium · Tailgate from 10am
  </text>
  <text id="text-footer" x="960" y="990" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#94A3B8" text-anchor="middle" data-customize-text="footer">
    Full schedule at calendar.university.edu
  </text>
</svg>
