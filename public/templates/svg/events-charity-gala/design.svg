<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#1A1B3A" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="6" fill="#D4AF37" data-customize-color="primary"/>
  <rect x="0" y="1074" width="1920" height="6" fill="#D4AF37" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="220" font-family="Georgia, serif"
        font-size="40" font-style="italic" fill="#D4AF37" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    Annual Charity Gala
  </text>
  <text id="text-headline" x="960" y="440" font-family="Georgia, serif"
        font-size="180" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    A Night of Hope
  </text>
  <text id="text-subheadline" x="960" y="600" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="subheadline">
    Saturday October 18th · 7:00pm
  </text>
  <text id="text-venue" x="960" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#D4AF37" text-anchor="middle"
        data-customize-text="venue" data-customize-color="primary">
    The Grand Ballroom · Black Tie
  </text>
  <text id="text-row1" x="960" y="830" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row1">
    Cocktails · Dinner · Live Auction · Dancing
  </text>
  <text id="text-cta" x="960" y="950" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#D4AF37" text-anchor="middle"
        data-customize-text="cta" data-customize-color="primary">
    Tickets &amp; sponsorships at hopegala.org
  </text>
</svg>
