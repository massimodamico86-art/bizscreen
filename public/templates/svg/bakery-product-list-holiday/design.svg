  </text>
  <text id="text-row4-price" x="1720" y="650" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C8553D" text-anchor="end"
        data-customize-text="row4-price" data-customize-color="primary">
    $28
  </text>
  <text id="text-row5-name" x="200" y="760" font-family="Georgia, serif"
        font-size="44" fill="#3D1F1A" text-anchor="start"
        data-customize-text="row5-name">
    Mulled Wine Cake Slice
  </text>
  <text id="text-row5-price" x="1720" y="760" font-family="Georgia, serif"
        font-size="44" font-weight="700" fill="#C8553D" text-anchor="end"
        data-customize-text="row5-price" data-customize-color="primary">
    $7
  </text>
  <text id="text-footer" x="960" y="950" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#666666" text-anchor="middle"
        data-customize-text="footer">
