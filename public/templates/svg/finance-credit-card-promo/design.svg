<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FFFFFF" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="540" fill="#1E293B" data-customize-color="primary"/>
  <image id="logo" x="120" y="80" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="220" font-family="Helvetica, Arial, sans-serif"
        font-size="36" letter-spacing="8" fill="#FFD700" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="accent">
    NEW CARDHOLDER OFFER
  </text>
  <text id="text-headline" x="960" y="450" font-family="Helvetica, Arial, sans-serif"
        font-size="180" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    50,000 Bonus Points
  </text>
  <text id="text-subheadline" x="960" y="700" font-family="Georgia, serif"
        font-size="56" font-weight="700" fill="#1E293B" text-anchor="middle"
        data-customize-text="subheadline">
    After $4,000 in spend in 90 days
  </text>
  <text id="text-row1" x="960" y="820" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#1E293B" text-anchor="middle"
        data-customize-text="row1">
    No annual fee · 0% APR for 15 months
  </text>
  <text id="text-cta" x="960" y="950" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#1E293B" text-anchor="middle"
        data-customize-text="cta" data-customize-color="primary">
    Apply in minutes · Visit our website
  </text>
</svg>
