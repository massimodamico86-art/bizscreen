<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FFFFFF" data-customize-color="background"/>
  <rect x="0" y="0" width="640" height="1080" fill="#0066FF" data-customize-color="primary"/>
  <image id="logo" x="80" y="80" width="120" height="120" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="80" y="320" font-family="Helvetica, Arial, sans-serif"
        font-size="32" letter-spacing="6" fill="#FFFFFF" text-anchor="start"
        data-customize-text="eyebrow">
    WHAT'S NEW
  </text>
  <text id="text-headline" x="80" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="96" font-weight="700" fill="#FFFFFF" text-anchor="start"
        data-customize-text="headline">
    Version 4.0
  </text>
  <text id="text-headline2" x="80" y="600" font-family="Helvetica, Arial, sans-serif"
