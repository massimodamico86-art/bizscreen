        data-customize-text="feat1-name" data-customize-color="primary">
    AI Assistant
  </text>
  <text id="text-feat1-detail" x="720" y="340" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#1A1A1A" text-anchor="start"
        data-customize-text="feat1-detail">
    Smart suggestions in your workflow
  </text>
  <text id="text-feat2-name" x="720" y="450" font-family="Helvetica, Arial, sans-serif"
        font-size="48" font-weight="700" fill="#0066FF" text-anchor="start"
        data-customize-text="feat2-name" data-customize-color="primary">
    Real-time Sync
  </text>
  <text id="text-feat2-detail" x="720" y="510" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#1A1A1A" text-anchor="start"
        data-customize-text="feat2-detail">
    Instant collaboration across devices
  </text>
  <text id="text-feat3-name" x="720" y="620" font-family="Helvetica, Arial, sans-serif"
        font-size="48" font-weight="700" fill="#0066FF" text-anchor="start"
        data-customize-text="feat3-name" data-customize-color="primary">
