<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#7B2D26" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="6" fill="#F0A04B" data-customize-color="primary"/>
  <rect x="0" y="1074" width="1920" height="6" fill="#F0A04B" data-customize-color="primary"/>
  <image id="logo" x="120" y="80" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="200" font-family="Helvetica, Arial, sans-serif"
        font-size="36" letter-spacing="8" fill="#F0A04B" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    FALL 2026 · CAMPUS LIFE
  </text>
  <text id="text-headline" x="960" y="350" font-family="Georgia, serif"
        font-size="120" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    This Week On Campus
  </text>
  <text id="text-event1-day" x="200" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#F0A04B" text-anchor="start"
        data-customize-text="event1-day" data-customize-color="primary">
    MON 14
  </text>
  <text id="text-event1-name" x="450" y="500" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#FFFFFF" text-anchor="start"
        data-customize-text="event1-name">
    Career Fair · Student Union 6pm
  </text>
  <text id="text-event2-day" x="200" y="600" font-family="Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#F0A04B" text-anchor="start"
        data-customize-text="event2-day" data-customize-color="primary">
    WED 16
  </text>
  <text id="text-event2-name" x="450" y="600" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#FFFFFF" text-anchor="start"
        data-customize-text="event2-name">
    Guest Lecture · Hall A 4:30pm
  </text>
  <text id="text-event3-day" x="200" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#F0A04B" text-anchor="start"
        data-customize-text="event3-day" data-customize-color="primary">
    FRI 18
  </text>
  <text id="text-event3-name" x="450" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#FFFFFF" text-anchor="start"
        data-customize-text="event3-name">
    Football Home Game · 7pm
  </text>
  <text id="text-event4-day" x="200" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#F0A04B" text-anchor="start"
        data-customize-text="event4-day" data-customize-color="primary">
    SAT 19
  </text>
  <text id="text-event4-name" x="450" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#FFFFFF" text-anchor="start"
        data-customize-text="event4-name">
    Homecoming Parade · 10am
  </text>
  <text id="text-footer" x="960" y="970" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="footer">
    Full schedule at campus.edu/events
  </text>
</svg>
