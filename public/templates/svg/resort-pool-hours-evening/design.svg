<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#0B3954" data-customize-color="background"/>
  <rect x="0" y="540" width="1920" height="540" fill="#087E8B" data-customize-color="primary"/>
  <image id="logo" x="120" y="100" width="120" height="120" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="280" font-family="Helvetica, Arial, sans-serif"
        font-size="40" letter-spacing="6" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="eyebrow">
    POOLSIDE NIGHTS
  </text>
  <text id="text-headline" x="960" y="450" font-family="Georgia, serif"
        font-size="140" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Evening Swim
  </text>
  <text id="text-subheadline" x="960" y="660" font-family="Helvetica, Arial, sans-serif"
        font-size="56" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="subheadline">
    6pm — 10pm Daily
  </text>
  <text id="text-row1" x="960" y="780" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row1">
    Heated pool · Towels provided
  </text>
  <text id="text-row2" x="960" y="850" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="row2">
    Pool bar open until 9:30pm
  </text>
  <text id="text-footer" x="960" y="980" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="footer">
    Children must be accompanied · No diving
  </text>
</svg>
