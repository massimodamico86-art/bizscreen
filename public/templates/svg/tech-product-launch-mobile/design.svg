<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#0A0E27" data-customize-color="background"/>
  <rect x="120" y="120" width="1680" height="840" fill="#1A1F3D" data-customize-color="card"/>
  <rect x="120" y="120" width="6" height="840" fill="#00D9FF" data-customize-color="primary"/>
  <image id="logo" x="180" y="180" width="80" height="80" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="180" y="350" font-family="Helvetica, Arial, sans-serif"
        font-size="32" letter-spacing="6" fill="#00D9FF" text-anchor="start"
        data-customize-text="eyebrow" data-customize-color="primary">
    INTRODUCING
  </text>
  <text id="text-headline" x="180" y="540" font-family="Helvetica, Arial, sans-serif"
        font-size="160" font-weight="700" fill="#FFFFFF" text-anchor="start"
        data-customize-text="headline">
    Acme Mobile
  </text>
  <text id="text-subheadline" x="180" y="660" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#9CA3DF" text-anchor="start"
        data-customize-text="subheadline">
    The fastest mobile app, ever
  </text>
  <text id="text-bullet1" x="180" y="800" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#00D9FF" text-anchor="start"
        data-customize-text="bullet1" data-customize-color="primary">
    · Instant sync across devices
  </text>
  <text id="text-bullet2" x="180" y="870" font-family="Helvetica, Arial, sans-serif"
        font-size="36" fill="#00D9FF" text-anchor="start"
        data-customize-text="bullet2" data-customize-color="primary">
    · End-to-end encrypted
  </text>
  <text id="text-cta" x="1700" y="900" font-family="Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#FFFFFF" text-anchor="end"
        data-customize-text="cta">
    App Store · Google Play
  </text>
</svg>
