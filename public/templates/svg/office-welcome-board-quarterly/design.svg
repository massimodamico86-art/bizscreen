<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#0F2C4D" data-customize-color="background"/>
  <rect x="120" y="120" width="1680" height="840" fill="#FFFFFF" data-customize-color="card"/>
  <rect x="120" y="120" width="1680" height="100" fill="#1E40AF" data-customize-color="primary"/>
  <image id="logo" x="180" y="140" width="60" height="60" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline-banner" x="960" y="190" font-family="Helvetica, Arial, sans-serif"
        font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="banner-title">
    Q2 All-Hands Quarterly
  </text>
  <text id="text-eyebrow" x="960" y="380" font-family="Helvetica, Arial, sans-serif"
        font-size="40" letter-spacing="6" fill="#1E40AF" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    THIS QUARTER
  </text>
  <text id="text-headline" x="960" y="540" font-family="Georgia, serif"
        font-size="120" font-weight="700" fill="#0F2C4D" text-anchor="middle"
        data-customize-text="headline">
    Welcome Back Team
  </text>
  <text id="text-bullet1" x="960" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#0F2C4D" text-anchor="middle"
        data-customize-text="bullet1">
    · Revenue grew 24% over Q1
  </text>
  <text id="text-bullet2" x="960" y="770" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#0F2C4D" text-anchor="middle"
        data-customize-text="bullet2">
    · 3 new product launches shipped
  </text>
  <text id="text-bullet3" x="960" y="840" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#0F2C4D" text-anchor="middle"
        data-customize-text="bullet3">
    · 12 new teammates joined
  </text>
  <text id="text-footer" x="960" y="930" font-family="Helvetica, Arial, sans-serif"
        font-size="28" fill="#666666" text-anchor="middle"
        data-customize-text="footer">
    All-hands meeting Friday · 2pm Conference Center
  </text>
</svg>
