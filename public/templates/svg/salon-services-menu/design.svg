<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#FBF4EE" data-customize-color="background"/>
  <rect x="0" y="0" width="1080" height="380" fill="#C77B89" data-customize-color="primary"/>
  <image id="logo" x="60" y="60" width="120" height="120" xlink:href=""
