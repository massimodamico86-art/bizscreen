<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#0A0E27" data-customize-color="background"/>
  <rect x="0" y="540" width="1920" height="540" fill="#FFFFFF" data-customize-color="card"/>
  <image id="logo" x="120" y="100" width="120" height="120" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="200" font-family="Helvetica, Arial, sans-serif"
        font-size="36" letter-spacing="8" fill="#00D9FF" text-anchor="middle"
        data-customize-text="eyebrow" data-customize-color="primary">
    LAUNCH EVENT
  </text>
  <text id="text-headline" x="960" y="400" font-family="Helvetica, Arial, sans-serif"
        font-size="180" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Reveal · 2026
  </text>
  <text id="text-subheadline" x="960" y="700" font-family="Georgia, serif"
        font-size="64" font-weight="700" fill="#0A0E27" text-anchor="middle"
        data-customize-text="subheadline">
    See what we've been building
  </text>
  <text id="text-row1" x="960" y="820" font-family="Helvetica, Arial, sans-serif"
        font-size="48" fill="#0A0E27" text-anchor="middle"
        data-customize-text="row1">
    November 12th · 10am Pacific
  </text>
  <text id="text-cta" x="960" y="970" font-family="Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#00D9FF" text-anchor="middle"
        data-customize-text="cta" data-customize-color="primary">
    Reserve your spot · launch.example.com
  </text>
</svg>
