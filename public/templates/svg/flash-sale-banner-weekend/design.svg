<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#9D0208" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="220" fill="#FFBA08" data-customize-color="primary"/>
  <image id="logo" x="120" y="60" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-eyebrow" x="960" y="140" font-family="Helvetica, Arial, sans-serif"
        font-size="56" font-weight="900" fill="#1a1a1a" text-anchor="middle"
        data-customize-text="eyebrow">
    WEEKEND ONLY
  </text>
  <text id="text-headline" x="960" y="540" font-family="Helvetica, Arial, sans-serif"
        font-size="280" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    50% OFF
  </text>
  <text id="text-subheadline" x="960" y="700" font-family="Helvetica, Arial, sans-serif"
        font-size="64" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="subheadline">
    Storewide · Saturday &amp; Sunday
  </text>
  <text id="text-cta" x="960" y="860" font-family="Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" fill="#FFBA08" text-anchor="middle"
        data-customize-text="cta" data-customize-color="primary">
    No coupon needed
  </text>
  <text id="text-footer" x="960" y="980" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="footer">
    Sale ends Sunday at 9pm
  </text>
</svg>
