<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#FFF7ED" data-customize-color="background"/>
  <rect x="0" y="0" width="1920" height="180" fill="#B45309" data-customize-color="primary"/>
  <image id="logo" x="80" y="40" width="100" height="100" xlink:href=""
         preserveAspectRatio="xMidYMid meet" data-customize-logo="brand"/>
  <text id="text-headline" x="960" y="120" font-family="Georgia, serif"
        font-size="84" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        data-customize-text="headline">
    Fresh from the Oven
  </text>
  <text id="text-item1" x="320" y="360" font-family="Georgia, serif"
        font-size="48" fill="#1a1a1a" text-anchor="start" data-customize-text="item1">
    Sourdough Boule
  </text>
  <text id="text-item1-price" x="1600" y="360" font-family="Georgia, serif"
        font-size="48" font-weight="700" fill="#B45309" text-anchor="end"
        data-customize-text="item1-price" data-customize-color="primary">
    $7.50
  </text>
  <text id="text-item2" x="320" y="480" font-family="Georgia, serif"
        font-size="48" fill="#1a1a1a" text-anchor="start" data-customize-text="item2">
    Croissant (butter or chocolate)
  </text>
  <text id="text-item2-price" x="1600" y="480" font-family="Georgia, serif"
        font-size="48" font-weight="700" fill="#B45309" text-anchor="end"
        data-customize-text="item2-price" data-customize-color="primary">
    $4.25
  </text>
  <text id="text-item3" x="320" y="600" font-family="Georgia, serif"
        font-size="48" fill="#1a1a1a" text-anchor="start" data-customize-text="item3">
    Cinnamon Roll
  </text>
  <text id="text-item3-price" x="1600" y="600" font-family="Georgia, serif"
        font-size="48" font-weight="700" fill="#B45309" text-anchor="end"
        data-customize-text="item3-price" data-customize-color="primary">
    $5.50
  </text>
  <text id="text-item4" x="320" y="720" font-family="Georgia, serif"
        font-size="48" fill="#1a1a1a" text-anchor="start" data-customize-text="item4">
    Lemon Tart
  </text>
  <text id="text-item4-price" x="1600" y="720" font-family="Georgia, serif"
        font-size="48" font-weight="700" fill="#B45309" text-anchor="end"
        data-customize-text="item4-price" data-customize-color="primary">
    $6.00
  </text>
  <text id="text-item5" x="320" y="840" font-family="Georgia, serif"
        font-size="48" fill="#1a1a1a" text-anchor="start" data-customize-text="item5">
    Whole Grain Loaf
  </text>
  <text id="text-item5-price" x="1600" y="840" font-family="Georgia, serif"
        font-size="48" font-weight="700" fill="#B45309" text-anchor="end"
        data-customize-text="item5-price" data-customize-color="primary">
    $8.00
  </text>
  <text id="text-footer" x="960" y="990" font-family="Helvetica, Arial, sans-serif"
        font-size="32" fill="#B45309" text-anchor="middle"
        data-customize-text="footer" data-customize-color="primary">
    Baked fresh daily · Pre-order online
  </text>
</svg>
